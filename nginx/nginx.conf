# nginx/nginx.conf
# OpenClaw Console — Nginx reverse proxy
# HTTP→HTTPS redirect + frontend + backend + webhook

events { worker_connections 1024; }

http {
  # ── Upstreams ──────────────────────────────────────────────
  upstream frontend { server frontend:3000; }
  upstream backend  { server backend:4000;  }

  # ── Rate limiting ──────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;
  limit_req_zone $binary_remote_addr zone=webhook:10m rate=120r/m;

  # ── HTTP → HTTPS redirect ──────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS main ─────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name your-domain.com;            # ← 改成你的網域

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-XSS-Protection        "1; mode=block"always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Frontend ──────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_cache_bypass $http_upgrade;
    }

    # ── Backend API ───────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass       http://backend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── LINE / platform webhooks ──────────────────────────────
    location /webhook/ {
      limit_req zone=webhook burst=50 nodelay;
      proxy_pass       http://backend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Pass raw body for signature verification
      proxy_request_buffering off;
    }

    # ── Static assets cache ───────────────────────────────────
    location /_next/static/ {
      proxy_pass http://frontend;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }
  }
}
